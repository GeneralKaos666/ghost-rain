name: Build signed release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v3.2)"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Set up keystore for signing
        if: env.KEYSTORE_B64 != ''
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          SP: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KA: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KP: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          printf '%s' "$KEYSTORE_B64" | base64 -d --ignore-garbage > "$RUNNER_TEMP/ghost-rain.jks"
          cat > keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/ghost-rain.jks
          storePassword=$SP
          keyAlias=$KA
          keyPassword=$KP
          EOF

      - name: Build release APK
        run: bash ./gradlew assembleRelease

      - name: Verify APK exists
        run: test -f app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.tag }}" \
            --title "${{ inputs.tag }}" \
            --generate-notes \
            ${{ inputs.prerelease && '--prerelease' || '' }} \
            app/build/outputs/apk/release/app-release.apk
