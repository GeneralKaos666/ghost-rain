name: Build signed release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Set up keystore for signing
        if: env.KEYSTORE_B64 != ''
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          SP: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KA: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KP: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode --ignore-garbage > "$RUNNER_TEMP/ghost-rain.jks"
          cat > keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/ghost-rain.jks
          storePassword=$SP
          keyAlias=$KA
          keyPassword=$KP
          EOF

      - name: Build release APK
        run: bash ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ghost-rain-apk
          path: app/build/outputs/apk/release/app-release.apk
